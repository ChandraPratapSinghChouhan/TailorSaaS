<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Tailor SaaS Final</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
.container { padding:15px; text-align:center; }

input,button{padding:10px;margin:5px;border:none;border-radius:6px;}
button{background:#22c55e;color:white;}

.table{width:100%;border-collapse:collapse;}
.table th,.table td{padding:8px;border-bottom:1px solid #444;}

#adminPanel,#clientPanel,#billPanel{display:none;}

#printArea{display:none;}

/* 🔥 PRINT FIX */
@media print{
  body *{display:none !important;}
  #printArea,#printArea *{display:block !important;}
  #printArea{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    background:white;
    color:black;
    padding:20px;
  }
}
</style>

</head>

<body>
<div class="container">

<!-- LOGIN -->

<div id="loginPanel">
<h2>Admin Login</h2>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->

<div id="adminPanel">
<h2>Admin Dashboard</h2>

<input id="shopId" placeholder="Shop ID">
<input id="shopNameInput" placeholder="Shop Name">
<input id="shopPhoneInput" placeholder="Phone">
<input id="shopAddressInput" placeholder="Address">
<button onclick="saveShop()">Save Shop</button>

<table class="table">
<thead><tr><th>ID</th><th>Name</th><th>Clients</th><th>Action</th></tr></thead>
<tbody id="shopTable"></tbody>
</table>
</div>

<!-- CLIENT -->

<div id="clientPanel">
<h1 id="shopName"></h1>
<h3 id="shopPhone"></h3>
<h4 id="shopAddress"></h4>

<input id="searchInput" placeholder="Search">

<table class="table">
<thead><tr><th>Name</th><th>Mobile</th><th>Book</th><th>Action</th></tr></thead>
<tbody id="recordsTable"></tbody>
</table>
</div>

<!-- BILL PANEL -->

<div id="billPanel">
<h2>Bill</h2>

<input id="itemName" placeholder="Item">
<input id="itemQty" type="number">
<input id="itemPrice" type="number">
<button onclick="addItem()">Add</button>

<div id="itemsList"></div>

<input id="tax" placeholder="Tax">
<input id="discount" placeholder="Discount">

<h2 id="total">KD 0</h2>

<button onclick="printBill()">Print</button> <button onclick="closeBill()">Close</button>

</div>

<!-- CLEAN PRINT AREA -->

<div id="printArea">

<div style="text-align:center">
<h1 id="pShopName"></h1>
<div id="pShopPhone"></div>
<div id="pShopAddress"></div>
</div>

<hr>

<div style="display:flex;justify-content:space-between">
<div id="pClient"></div>
<div id="pDate"></div>
</div>

<br>

<table border="1" width="100%" style="border-collapse:collapse;text-align:center">
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price (KD)</th>
<th>Total (KD)</th>
</tr>
</thead>
<tbody id="pItems"></tbody>
</table>

<br>

<div style="text-align:right">
<div id="pTax"></div>
<div id="pDiscount"></div>
<h2>Grand Total: <span id="pTotal"></span></h2>
</div>

<br><br>

<div style="text-align:center">Thank you</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyAr3IEvh2rCzmqDVmRqkyb40u79880x1sE",
databaseURL:"https://tailorsaas-9f51c-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db=firebase.database();
let currentShop="",data=[],billItems=[],currentClient=null;

/* LOGIN */
function login(){
 if(pass.value==="admin123"){
  loginPanel.style.display="none";
  adminPanel.style.display="block";
  loadShops();
 }
}

/* SHOP */
function saveShop(){
 let id=shopId.value;
 db.ref("shops/"+id+"/info").set({
  name:shopNameInput.value,
  phone:shopPhoneInput.value,
  address:shopAddressInput.value
 });
}

function loadShops(){
 db.ref("shops").on("value",s=>{
  let v=s.val()||{},html="";
  for(let k in v){
   html+=`<tr>
   <td>${k}</td>
   <td>${v[k].info?.name}</td>
   <td>${v[k].clients?Object.keys(v[k].clients).length:0}</td>
   <td><button onclick="openShop('${k}')">Open</button></td>
   </tr>`;
  }
  shopTable.innerHTML=html;
 });
}

function openShop(id){
 currentShop=id;
 adminPanel.style.display="none";
 clientPanel.style.display="block";

 db.ref("shops/"+id+"/info").once("value",s=>{
  let i=s.val();
  shopName.innerText=i.name;
  shopPhone.innerText=i.phone;
  shopAddress.innerText=i.address;
 });

 db.ref("shops/"+id+"/clients").on("value",s=>{
  let v=s.val()||{};
  data=Object.values(v);
  render(data);
 });
}

/* CLIENT */
function render(arr){
 let html="";
 arr.forEach((r,i)=>{
  html+=`<tr>
  <td>${r.name}</td>
  <td>${r.mobile}</td>
  <td>${r.serial||""}</td>
  <td><button onclick="openBill(${i})">🧾</button></td>
  </tr>`;
 });
 recordsTable.innerHTML=html;
}

/* BILL */
function openBill(i){
 currentClient=data[i];
 billItems=[];
 billPanel.style.display="block";
}

function addItem(){
 billItems.push({n:itemName.value,q:+itemQty.value,p:+itemPrice.value});
 renderItems();
 calculate();
}

function renderItems(){
 itemsList.innerHTML=billItems.map(i=>`${i.n} (${i.q} x KD ${i.p})`).join("<br>");
}

function calculate(){
 let t=billItems.reduce((a,b)=>a+(b.q*b.p),0);
 let taxVal=t*(tax.value||0)/100;
 let dis=+discount.value||0;
 total.innerText="KD "+Math.round(t+taxVal-dis);
}

/* PRINT FIXED */
function fillPrint(){
 pShopName.innerText=shopName.innerText;
 pShopPhone.innerText=shopPhone.innerText;
 pShopAddress.innerText=shopAddress.innerText;
 pClient.innerText="Client: "+currentClient.name;
 pDate.innerText=new Date().toLocaleDateString();

 let html="",subtotal=0;
 billItems.forEach(i=>{
  let t=i.q*i.p;
  subtotal+=t;
  html+=`<tr>
  <td>${i.n}</td>
  <td>${i.q}</td>
  <td>KD ${i.p}</td>
  <td>KD ${t}</td>
  </tr>`;
 });
 pItems.innerHTML=html;

 let taxVal=subtotal*(tax.value||0)/100;
 let dis=+discount.value||0;
 let grand=Math.round(subtotal+taxVal-dis);

 pTax.innerText="Tax: KD "+taxVal;
 pDiscount.innerText="Discount: KD "+dis;
 pTotal.innerText="KD "+grand;
}

function printBill(){
 fillPrint();
 window.print();
}

function closeBill(){
 billPanel.style.display="none";
}

window.onload=function(){
 let s=new URLSearchParams(location.search).get("shop");
 if(s) openShop(s);
};
</script>

</body>
</html>
