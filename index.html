<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Tailor Final Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
.container { padding:15px; text-align:center; }

input, button {
  padding:10px; margin:5px;
  border-radius:6px; border:none;
}

button { background:#22c55e; color:white; cursor:pointer; }

.searchBox { width:90%; padding:12px; font-size:16px; }

.table { width:100%; border-collapse: collapse; }
.table th, .table td { padding:8px; border-bottom:1px solid #444; }

#adminPanel, #clientPanel { display:none; }
#addForm { display:none; }
#billPanel { display:none; background:#020617; padding:15px; margin-top:10px; }

</style>

</head>

<body>

<div class="container">

<!-- LOGIN -->

<div id="loginPanel">
  <h2>Admin Login</h2>
  <input id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN -->

<div id="adminPanel">
  <h2>Admin Dashboard</h2>

  <input id="newPass" placeholder="Change Password">
  <button onclick="changePassword()">Update Password</button>

<br><br>

  <input id="shopId" placeholder="Shop ID">
  <input id="shopNameInput" placeholder="Shop Name">
  <input id="shopPhoneInput" placeholder="Phone">
  <input id="shopAddressInput" placeholder="Address">

<button onclick="saveShop()">Save / Update Shop</button>

  <table class="table">
    <thead>
      <tr><th>ID</th><th>Name</th><th>Total Clients</th><th>Actions</th></tr>
    </thead>
    <tbody id="shopTable"></tbody>
  </table>
</div>

<!-- CLIENT -->

<div id="clientPanel">

  <h1 id="shopName"></h1>
  <h3 id="shopPhone"></h3>
  <h4 id="shopAddress"></h4>

  <h4>Total Records: <span id="totalCount">0</span></h4>

  <input id="searchInput" class="searchBox" placeholder="Search name / mobile / book">

  <div>
    <button onclick="toggleAdd()">➕ Add</button>
    <button onclick="exportData()">💾 Export</button>
    <input type="file" id="importFile" style="display:none">
    <button onclick="importFile.click()">Import</button>
  </div>

  <div id="addForm">
    <input id="nameInput" placeholder="Name">
    <input id="mobileInput" placeholder="Mobile">
    <input id="serialInput" placeholder="Book No">
    <button onclick="saveRecord()">Save</button>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>#</th><th>Name</th><th>Mobile</th><th>Book</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="recordsTable"></tbody>
  </table>

</div>

<!-- BILL PANEL -->

<div id="billPanel">
  <h2>🧾 Bill</h2>
  <div id="billClient"></div>

  <input id="itemName" placeholder="Item">
  <input id="itemQty" type="number" placeholder="Qty">
  <input id="itemPrice" type="number" placeholder="Price">
  <button onclick="addItem()">Add Item</button>

  <div id="itemsList"></div>

  <br>
  <input id="tax" placeholder="Tax %">
  <input id="discount" placeholder="Discount">

  <h2>Total <span id="total">KD 0</span></h2>

<button onclick="printBill()">Print</button> <button onclick="sendWA()">WhatsApp</button> <button onclick="closeBill()">Close</button>

</div>

<!-- PRINT AREA -->

<div id="printArea" style="display:none; color:black; background:white; padding:20px">

<h2 id="pShopName"></h2>
<div id="pShopPhone"></div>
<div id="pShopAddress"></div>

<hr>

<h3 id="pClient"></h3>

<table border="1" width="100%" style="border-collapse:collapse;text-align:center">
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price (KD)</th>
<th>Total (KD)</th>
</tr>
</thead>
<tbody id="pItems"></tbody>
</table>

<br>

<div id="pTax"></div>
<div id="pDiscount"></div>

<h2 style="text-align:right;font-size:26px">Grand Total: <span id="pTotal"></span></h2>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAr3IEvh2rCzmqDVmRqkyb40u79880x1sE",
  authDomain: "tailorsaas-9f51c.firebaseapp.com",
  databaseURL: "https://tailorsaas-9f51c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tailorsaas-9f51c",
  storageBucket: "tailorsaas-9f51c.firebasestorage.app",
  messagingSenderId: "827905458969",
  appId: "1:827905458969:web:d8723cefbf9798e52f3b88"
});

const db=firebase.database();

let currentShop="",localKey="",data=[],editIndex=null;
let billItems=[],currentClient=null;

let adminPass=localStorage.getItem("pass")||"admin123";

function login(){
 if(pass.value===adminPass){
  loginPanel.style.display="none";
  adminPanel.style.display="block";
  loadShops();
 } else alert("Wrong password");
}

function changePassword(){
 if(!newPass.value) return;
 localStorage.setItem("pass",newPass.value);
 adminPass=newPass.value;
 alert("Updated");
}

function saveShop(){
 let id=shopId.value.trim();
 let name=shopNameInput.value.trim();
 if(!id||!name) return alert("Required");

 db.ref("shops/"+id+"/info").set({
  name,
  phone:shopPhoneInput.value,
  address:shopAddressInput.value
 });
}

function loadShops(){
 db.ref("shops").on("value",s=>{
  let v=s.val()||{},html="";
  for(let k in v){
    let i=v[k].info||{};
    let count=v[k].clients?Object.keys(v[k].clients).length:0;

    html+=`<tr>
    <td>${k}</td>
    <td>${i.name||""}</td>
    <td>${count}</td>
    <td>
      <button onclick="openShop('${k}')">🔗</button>
      <button onclick="editShop('${k}','${i.name}','${i.phone}','${i.address}')">✏️</button>
      <button onclick="deleteShop('${k}')">🗑️</button>
    </td>
    </tr>`;
  }
  shopTable.innerHTML=html;
 });
}

function openShop(id){
 window.open(location.href.split("?")[0]+"?shop="+id,"_blank");
}

function editShop(id,n,p,a){
 shopId.value=id;
 shopNameInput.value=n;
 shopPhoneInput.value=p;
 shopAddressInput.value=a;
}

function deleteShop(id){
 if(confirm("Delete?")) db.ref("shops/"+id).remove();
}

function loadClient(id){
 currentShop=id;
 localKey="shop_"+id;

 loginPanel.style.display="none";
 adminPanel.style.display="none";
 clientPanel.style.display="block";

 loadLocal();

 db.ref("shops/"+id+"/info").once("value",s=>{
  let i=s.val();
  shopName.innerText=i?.name||id;
  shopPhone.innerText="Phone - "+(i?.phone||"");
  shopAddress.innerText=i?.address||"";
 });

 render(data.slice(-10).reverse());
 syncFromFirebase();
}

function loadLocal(){
 let d=localStorage.getItem(localKey);
 data=d?JSON.parse(d):[];
}
function saveLocal(){
 localStorage.setItem(localKey,JSON.stringify(data));
}

function mergeRecord(rec){
 let existing=data.find(d=>d.mobile===rec.mobile);

 if(existing && editIndex===null){
  existing.serial=rec.serial||existing.serial;
  existing.name=rec.name||existing.name;
 } else {
  if(editIndex!==null){
    data[editIndex]=rec;
    editIndex=null;
  } else {
    data.push(rec);
  }
 }
}

function toggleAdd(){
 addForm.style.display = addForm.style.display==="none"?"block":"none";
}

function saveRecord(){
 let rec={
  name:nameInput.value.trim(),
  mobile:mobileInput.value.trim(),
  serial:serialInput.value.trim(),
  synced:false
 };

 if(!rec.name||!rec.mobile) return alert("Required");

 mergeRecord(rec);
 saveLocal();

 nameInput.value="";
 mobileInput.value="";
 serialInput.value="";

 render(data.slice(-10).reverse());
}

function editRecord(i){
 let r=data[i];
 nameInput.value=r.name;
 mobileInput.value=r.mobile;
 serialInput.value=r.serial;
 editIndex=i;
 addForm.style.display="block";
}

searchInput.oninput=function(){
 let v=this.value.toLowerCase().trim();

 if(!v){
  render(data.slice(-10).reverse());
  return;
 }

 let result=data.filter(r=>
  (r.name||"").toLowerCase().includes(v) ||
  (r.mobile||"").includes(v) ||
  (r.serial||"").toLowerCase().includes(v)
 );

 render(result);
};

function render(arr){
 let html="";
 arr.forEach((r,i)=>{
  let realIndex=data.findIndex(d=>d.mobile===r.mobile);

  html+=`<tr>
  <td>${i+1}</td>
  <td>${r.name}</td>
  <td>${r.mobile}</td>
  <td>${r.serial}</td>
  <td>
    <button onclick="editRecord(${realIndex})">✏️</button>
    <button onclick="openBill(${realIndex})">🧾</button>
  </td>
  </tr>`;
 });

 recordsTable.innerHTML=html;
 totalCount.innerText=data.length;
}

function exportData(){
 if(data.length===0) return alert("No data");

 let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download=currentShop+"_backup.json";
 a.click();
}

document.getElementById("importFile").addEventListener("change",function(e){
 let file=e.target.files[0];
 if(!file) return;

 let r=new FileReader();
 r.onload=x=>{
  try{
   let json=JSON.parse(x.target.result);
   json.forEach(item=>mergeRecord({...item,synced:false}));
   saveLocal();
   render(data.slice(-10).reverse());
   alert("Imported");
  }catch{ alert("Invalid file"); }
 };
 r.readAsText(file);
});

/* BILL */
function openBill(i){
 currentClient=data[i];
 billPanel.style.display="block";
 billItems=[];
 total.innerText="KD 0";

 billClient.innerHTML="<b>"+currentClient.name+"</b><br>"+currentClient.mobile;
 itemsList.innerHTML="";
}

function closeBill(){ billPanel.style.display="none"; }

function addItem(){
 let n=itemName.value,q=+itemQty.value,p=+itemPrice.value;
 if(!n||!q||!p) return;

 billItems.push({n,q,p});
 renderItems();
 calculate();
}

function renderItems(){
 let html="";
 billItems.forEach(i=>{
  html+=`<div>${i.n} (${i.q} x KD ${i.p}) = KD ${i.q*i.p}</div>`;
 });
 itemsList.innerHTML=html;
}

function calculate(){
 let t=0;
 billItems.forEach(i=>t+=i.q*i.p);

 let taxVal=t*(tax.value||0)/100;
 let dis=+discount.value||0;

 total.innerText="KD "+Math.round(t+taxVal-dis);
}

function printBill(){

 pShopName.innerText = shopName.innerText;
 pShopPhone.innerText = shopPhone.innerText;
 pShopAddress.innerText = shopAddress.innerText;

 pClient.innerText = "Client: " + currentClient.name;

 let html="";
 let subtotal=0;

 billItems.forEach(i=>{
  let t=i.q*i.p;
  subtotal+=t;

  html+=`<tr>
    <td>${i.n}</td>
    <td>${i.q}</td>
    <td>KD ${i.p}</td>
    <td>KD ${t}</td>
  </tr>`;
 });

 pItems.innerHTML = html;

 let taxVal = subtotal*(tax.value||0)/100;
 let dis = +discount.value||0;
 let grand = Math.round(subtotal + taxVal - dis);

 pTax.innerText = "Tax: KD " + taxVal.toFixed(2);
 pDiscount.innerText = "Discount: KD " + dis;
 pTotal.innerText = "KD " + grand;

 let original = document.body.innerHTML;
 document.body.innerHTML = printArea.innerHTML;
 window.print();
 document.body.innerHTML = original;
 location.reload();
}

function sendWA(){
 let msg="Bill for "+currentClient.name+" Total KD "+total.innerText;
 window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

function syncFromFirebase(){
 if(!navigator.onLine) return;

 db.ref("shops/"+currentShop+"/clients").once("value",s=>{
  let v=s.val();
  if(!v) return;

  for(let k in v){
    mergeRecord({...v[k],synced:true});
  }

  saveLocal();
 });
}

window.onload=function(){
 let s=new URLSearchParams(location.search).get("shop");
 if(s) loadClient(s);
};
</script>

</body>
</html>
