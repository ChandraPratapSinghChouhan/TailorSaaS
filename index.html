<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Tailor Final Working</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
.container { padding:15px; text-align:center; }
input, button { padding:10px; margin:5px; border-radius:6px; border:none; }
button { background:#22c55e; color:white; cursor:pointer; }
.table { width:100%; border-collapse: collapse; }
.table th, .table td { padding:8px; border-bottom:1px solid #444; }
#adminPanel,#clientPanel,#billPanel { display:none; }
.searchBox { width:95%; padding:12px; }
</style>

</head>

<body>
<div class="container">

<!-- LOGIN -->

<div id="loginPanel">
<h2>Admin Login</h2>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->

<div id="adminPanel">
<h2>Admin Dashboard</h2>
<input id="shopId" placeholder="Shop ID">
<input id="shopName" placeholder="Shop Name">
<button onclick="saveShop()">Save Shop</button>
<div id="shops"></div>
</div>

<!-- CLIENT -->

<div id="clientPanel">
<h2 id="shopTitle"></h2>

<input id="search" class="searchBox" placeholder="Search">

<br>

<input id="name" placeholder="Client Name">
<input id="mobile" placeholder="Mobile">
<button onclick="addClient()">Add</button>

<table class="table">
<thead><tr><th>Name</th><th>Mobile</th><th>Action</th></tr></thead>
<tbody id="list"></tbody>
</table>
</div>

<!-- BILL -->

<div id="billPanel" style="padding:15px;background:#020617">
<h2>Bill</h2>
<div id="billClient"></div>

<input id="itemName" placeholder="Item">
<input id="itemQty" type="number" placeholder="Qty">
<input id="itemPrice" type="number" placeholder="Price">
<button onclick="addItem()">Add Item</button>

<div id="itemsList"></div>

<br>
<input id="tax" placeholder="Tax %">
<input id="discount" placeholder="Discount">

<h2>Total ₹<span id="total">0</span></h2>

<button onclick="printBill()">Print</button> <button onclick="sendWA()">WhatsApp</button> <button onclick="closeBill()">Close</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyAr3IEvh2rCzmqDVmRqkyb40u79880x1sE",
  databaseURL: "https://tailorsaas-9f51c-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = firebase.database();

let adminPass="admin123";

function login(){
 if(pass.value===adminPass){
  loginPanel.style.display="none";
  adminPanel.style.display="block";
  loadShops();
 } else alert("Wrong password");
}

function saveShop(){
 let id=shopId.value,name=shopName.value;
 db.ref("shops/"+id+"/info").set({name});
}

function loadShops(){
 db.ref("shops").on("value",s=>{
  let v=s.val()||{},html="";
  for(let k in v){
    html+=`<div>${k} - ${v[k].info?.name||""}
    <button onclick="openShop('${k}')">Open</button></div>`;
  }
  shops.innerHTML=html;
 });
}

function openShop(id){
 location="?shop="+id;
}

let currentShop=new URLSearchParams(location.search).get("shop");
let data=[];

if(currentShop){
 loginPanel.style.display="none";
 clientPanel.style.display="block";
 shopTitle.innerText="Shop: "+currentShop;

 db.ref("shops/"+currentShop+"/clients").on("value",s=>{
  data=[];
  let v=s.val()||{};
  for(let k in v){data.push(v[k]);}
  render(data);
 });
}

function addClient(){
 let n=name.value,m=mobile.value;
 db.ref("shops/"+currentShop+"/clients").push({name:n,mobile:m});
}

function render(arr){
 let html="";
 arr.forEach((d,i)=>{
  html+=`<tr>
  <td>${d.name}</td>
  <td>${d.mobile}</td>
  <td>
    <button onclick="openBill(${i})">Bill</button>
  </td>
  </tr>`;
 });
 list.innerHTML=html;
}

search.oninput=function(){
 let v=this.value.toLowerCase();
 render(data.filter(d=>d.name.toLowerCase().includes(v)||d.mobile.includes(v)));
}

/* BILL SYSTEM */
let billItems=[];
let currentClient=null;

function openBill(i){
 currentClient=data[i];
 billPanel.style.display="block";
 billItems=[];
 total.innerText=0;

 billClient.innerHTML="<b>"+currentClient.name+"</b><br>"+currentClient.mobile;
 itemsList.innerHTML="";
}

function closeBill(){
 billPanel.style.display="none";
}

function addItem(){
 let n=itemName.value,q=+itemQty.value,p=+itemPrice.value;
 if(!n||!q||!p) return;

 billItems.push({n,q,p});
 renderItems();
 calculate();
}

function renderItems(){
 let html="";
 billItems.forEach(i=>{
  html+=`<div>${i.n} (${i.q} x ${i.p}) = ₹${i.q*i.p}</div>`;
 });
 itemsList.innerHTML=html;
}

function calculate(){
 let t=0;
 billItems.forEach(i=>t+=i.q*i.p);

 let taxVal=t*(tax.value||0)/100;
 let dis=+discount.value||0;

 total.innerText=Math.round(t+taxVal-dis);
}

function printBill(){ window.print(); }

function sendWA(){
 let msg="Bill for "+currentClient.name+" Total ₹"+total.innerText;
 window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
