<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tailor SaaS Final</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
.container { padding:15px; text-align:center; }
input, button { padding:10px; margin:5px; border-radius:6px; border:none; }
button { background:#22c55e; color:white; cursor:pointer; }
.table { width:100%; border-collapse: collapse; }
.table th, .table td { padding:8px; border-bottom:1px solid #444; }
#adminPanel, #clientPanel { display:none; }
</style>
</head>

<body>
<div class="container">

<div id="loginPanel">
<h2>Admin Login</h2>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel">
<h2>Admin Dashboard</h2>
<input id="shopId" placeholder="Shop ID">
<input id="shopName" placeholder="Shop Name">
<button onclick="saveShop()">Save Shop</button>
<div id="shops"></div>
</div>

<div id="clientPanel">
<h2 id="shopTitle"></h2>
<input id="name" placeholder="Client Name">
<input id="mobile" placeholder="Mobile">
<button onclick="addClient()">Add</button>
<div id="list"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>

// ✅ CORRECT Firebase init (fixed)
firebase.initializeApp({
  apiKey: "AIzaSyAr3IEvh2rCzmqDVmRqkyb40u79880x1sE",
  authDomain: "tailorsaas-9f51c.firebaseapp.com",
  databaseURL: "https://tailorsaas-9f51c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tailorsaas-9f51c",
  storageBucket: "tailorsaas-9f51c.firebasestorage.app",
  messagingSenderId: "827905458969",
  appId: "1:827905458969:web:d8723cefbf9798e52f3b88"
});

const db = firebase.database();

let adminPass = localStorage.getItem("pass") || "admin123";

function login(){
  if(pass.value === adminPass){
    loginPanel.style.display="none";
    adminPanel.style.display="block";
    loadShops();
  } else alert("Wrong password");
}

function saveShop(){
  let id = shopId.value;
  let name = shopName.value;
  if(!id || !name) return alert("Enter data");

  db.ref("shops/"+id+"/info").set({name});
}

function loadShops(){
  db.ref("shops").on("value", s=>{
    let v=s.val()||{}, html="";
    for(let k in v){
      html+=`<div>${k} - ${v[k].info?.name||""}
      <button onclick="openShop('${k}')">Open</button></div>`;
    }
    shops.innerHTML=html;
  });
}

function openShop(id){
  window.location="?shop="+id;
}

let currentShop = new URLSearchParams(location.search).get("shop");

if(currentShop){
  loginPanel.style.display="none";
  clientPanel.style.display="block";
  shopTitle.innerText="Shop: "+currentShop;

  db.ref("shops/"+currentShop+"/clients").on("value", s=>{
    let v=s.val()||{}, html="";
    for(let k in v){
      html+=`<div>${v[k].name} - ${v[k].mobile}</div>`;
    }
    list.innerHTML=html;
  });
}

function addClient(){
  let n=name.value, m=mobile.value;
  if(!n || !m) return alert("Enter data");

  db.ref("shops/"+currentShop+"/clients").push({name:n,mobile:m});
}

</script>

</body>
</html>
