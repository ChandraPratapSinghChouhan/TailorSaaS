<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tailor Pro Stable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;margin:0;}
input,button{padding:10px;margin:5px;border-radius:6px;border:none;}
button{cursor:pointer;}
.table{width:100%;border-collapse:collapse;}
td,th{padding:6px;border-bottom:1px solid #444;}
#adminPanel,#clientPanel,#clientForm{display:none;}
input{width:95%;}
.btn{padding:6px 10px;margin:2px;border-radius:5px;color:white;}
.call{background:#3b82f6;}
.wa{background:#25D366;}
.print{background:#22c55e;}
.edit{background:#facc15;color:black;}
</style>
</head>

<body>

<div id="loginPanel">
<h2>Admin Login</h2>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel">
<h3>Admin Panel</h3>
<input id="shopId" placeholder="Shop ID">
<input id="shopNameInput" placeholder="Shop Name">
<input id="shopPhoneInput" placeholder="Phone">
<input id="shopAddressInput" placeholder="Address">
<button onclick="saveShop()">Save Shop</button>

<table class="table">
<thead><tr><th>ID</th><th>Name</th><th>Total</th><th>Action</th></tr></thead>
<tbody id="shopTable"></tbody>
</table>
</div>

<div id="clientPanel">
<h2 id="shopName"></h2>
<p id="shopPhone"></p>
<p id="shopAddress"></p>
<h3 id="totalClients"></h3>

<button onclick="showForm()">➕ Add Client</button>
<button onclick="importData()">📥 Import</button>
<button onclick="exportData()">📤 Export</button>

<input id="searchInput" placeholder="Search...">

<div id="clientForm">
<input id="nameInput" placeholder="Name">
<input id="mobileInput" placeholder="Mobile">
<input id="serialInput" placeholder="Book No">

<input type="file" id="imageInput" multiple>
<div id="imagePreview"></div>

<button onclick="saveClient()">Save</button>
</div>

<table class="table">
<thead><tr><th>Name</th><th>Phone</th><th>Book</th><th>Action</th></tr></thead>
<tbody id="clientTable"></tbody>
</table>
</div>

<script>

firebase.initializeApp({
 apiKey:"AIzaSy...",
 authDomain:"tailor-pro-new-9e723.firebaseapp.com",
 projectId:"tailor-pro-new-9e723"
});

let db=firebase.firestore();
let currentShop="";
let editClientId=null;
let adminPass="admin123";
let allClients=[];

/* LOGIN */
function login(){
 if(pass.value===adminPass){
  loginPanel.style.display="none";
  adminPanel.style.display="block";
  loadShops();
 }else alert("Wrong Password");
}

/* SHOP */
async function saveShop(){
 let data={
  id:shopId.value,
  name:shopNameInput.value,
  phone:shopPhoneInput.value,
  address:shopAddressInput.value
 };

 if(window.editShopId){
  await db.collection("shops").doc(window.editShopId).update(data);
  window.editShopId=null;
 }else{
  await db.collection("shops").add(data);
 }

 loadShops();
}

async function loadShops(){
 let snap=await db.collection("shops").get();
 let html="";
 for(let d of snap.docs){
  let s=d.data();
  let c=await db.collection("clients").where("shop","==",s.id).get();
  let link=location.origin+location.pathname+"?shop="+s.id;

  html+=`<tr>
  <td>${s.id}</td>
  <td>${s.name}</td>
  <td>${c.size}</td>
  <td>
   <a href="${link}" target="_blank">Open</a>
   <button onclick='editShop("${d.id}",${JSON.stringify(s)})'>✏️</button>
   <button onclick='deleteShop("${d.id}")'>🗑️</button>
  </td>
  </tr>`;
 }
 shopTable.innerHTML=html;
}

function editShop(id,s){
 shopId.value=s.id;
 shopNameInput.value=s.name;
 shopPhoneInput.value=s.phone;
 shopAddressInput.value=s.address;
 window.editShopId=id;
}

async function deleteShop(id){
 if(confirm("Delete shop?")){
  await db.collection("shops").doc(id).delete();
  loadShops();
 }
}

/* OPEN SHOP */
let p=new URLSearchParams(location.search);
if(p.get("shop")){
 loginPanel.style.display="none";
 openShop(p.get("shop"));
}

async function openShop(id){
 let snap=await db.collection("shops").where("id","==",id).get();
 snap.forEach(d=>{
  let s=d.data();
  currentShop=s.id;
  clientPanel.style.display="block";
  shopName.innerText=s.name;
  shopPhone.innerText=s.phone;
  shopAddress.innerText=s.address;
  loadClients();
 });
}

/* IMAGE */
let selectedImages=[];
imageInput.onchange=function(){
 selectedImages=[...this.files];
 renderPreview();
};

function renderPreview(){
 let html="";
 selectedImages.forEach((f,i)=>{
  let url=URL.createObjectURL(f);
  html+=`<div style="display:inline-block;position:relative;">
   <img src="${url}" width="70">
   <button onclick="removeImage(${i})">×</button>
  </div>`;
 });
 imagePreview.innerHTML=html;
}

function removeImage(i){
 selectedImages.splice(i,1);
 renderPreview();
}

async function uploadImage(file){
 let fd=new FormData();
 fd.append("file",file);
 fd.append("upload_preset","unsigned_preset");
 let r=await fetch("https://api.cloudinary.com/v1_1/da1m4wmdb/image/upload",{method:"POST",body:fd});
 let d=await r.json();
 return d.secure_url;
}

/* SAVE CLIENT */
async function saveClient(){
 let urls=[];
 for(let f of selectedImages){
  urls.push(await uploadImage(f));
 }

 let obj={
  shop:currentShop,
  name:nameInput.value,
  mobile:mobileInput.value,
  serial:serialInput.value,
  image:urls
 };

 if(editClientId){
  await db.collection("clients").doc(editClientId).update(obj);
 }else{
  await db.collection("clients").add(obj);
 }

 selectedImages=[];
 imagePreview.innerHTML="";
 editClientId=null;

 clientForm.style.display="none";
 loadClients();
}

/* LOAD CLIENT */
async function loadClients(){
 let snap=await db.collection("clients").where("shop","==",currentShop).get();
 allClients=[];
 snap.forEach(d=>allClients.push({...d.data(),id:d.id}));

 totalClients.innerText="Total: "+allClients.length;
 render(allClients);
}

/* SEARCH (FINAL FIX) */
searchInput.oninput=function(){
 let v=this.value.toLowerCase().trim();

 if(!v){
   render(allClients);
   return;
 }

 let filtered=allClients.filter(r=>{
  return (
   (r.name||"").toLowerCase().includes(v) ||
   (r.mobile||"").includes(v) ||
   (r.serial||"").toLowerCase().includes(v)
  );
 });

 render(filtered);
};

/* RENDER */
function render(arr){
 let html="";
 arr.forEach(r=>{
 html+=`<tr>
 <td>${r.name||""}</td>
 <td>${r.mobile||""}</td>
 <td>${r.serial||""}</td>
 <td>
 <button class="btn edit" onclick='editClient(${JSON.stringify(r)})'>✏️</button>
 <button class="btn print" onclick='printSlip(${JSON.stringify(r)})'>🖨️</button>
 <button class="btn call" onclick='callClient("${r.mobile}")'>📞</button>
 <button class="btn wa" onclick='whatsappClient("${r.mobile}")'>💬</button>
 </td>
 </tr>`;
 });
 clientTable.innerHTML=html;
}

/* PRINT */
function printSlip(r){
 let w=window.open("");
 let imgs="";
 if(r.image){
  (Array.isArray(r.image)?r.image:[r.image]).forEach(i=>{
   imgs+=`<img src="${i}" style="width:100%;margin-top:10px;">`;
  });
 }

 w.document.write(`
 <html>
 <style>
 @page{size:A4;margin:0;}
 body{font-family:Arial;text-align:center;}
 .box{width:210mm;height:297mm;padding:15mm;box-sizing:border-box;}
 img{max-height:140mm;object-fit:contain;}
 </style>
 <body>
 <div class="box">
 <h2>${shopName.innerText}</h2>
 <p>${shopPhone.innerText}</p>
 <p>${shopAddress.innerText}</p>
 <hr>
 <h3>${r.name}</h3>
 <p>${r.mobile}</p>
 <p>${r.serial}</p>
 ${imgs}
 </div>
 <script>window.onload=()=>setTimeout(()=>window.print(),500)<\/script>
 </body>
 </html>
 `);
 w.document.close();
}

/* CALL + WA */
function callClient(p){location.href="tel:"+p;}
function whatsappClient(p){
 let msg=encodeURIComponent("Hello from "+shopName.innerText);
 window.open("https://wa.me/"+p+"?text="+msg);
}

/* IMPORT EXPORT */
async function exportData(){
 let blob=new Blob([JSON.stringify(allClients)],{type:"application/json"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="clients.json";
 a.click();
}

function importData(){
 let i=document.createElement("input");
 i.type="file";
 i.onchange=async e=>{
  let data=JSON.parse(await e.target.files[0].text());
  for(let d of data){
   await db.collection("clients").add({...d,shop:currentShop});
  }
  loadClients();
 };
 i.click();
}

/* EDIT */
function editClient(r){
 showForm();
 nameInput.value=r.name||"";
 mobileInput.value=r.mobile||"";
 serialInput.value=r.serial||"";
 editClientId=r.id;
}

function showForm(){clientForm.style.display="block";}

</script>
</body>
</html>
